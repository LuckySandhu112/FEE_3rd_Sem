<!DOCTYPE html>
<html>
<head>
    <title>Sales Report Table</title>
</head>
<body>

    <h2>Sales Report</h2>

    <table border="2" cellpadding="10" cellspacing="5" width="70%">
        
        <tr bgcolor="#66FFFF">
            <th colspan="2">October</th>
            <th colspan="2">November</th>
        </tr>

        <tr>
            <th>Sales</th>
            <th>Profit</th>
            <th>Sales</th>
            <th>Profit</th>
        </tr>

        <tr>
            <td>Rs. 200,000</td>
            <td>Rs. 50,000</td>
            <td>Rs. 300,000</td>
            <td>Rs. 70,000</td>
        </tr>

        <tr bgcolor="lightgray">
            <th colspan="4">
                November was more productive
            </th>
        </tr>

    </table>

</body>
</html>
